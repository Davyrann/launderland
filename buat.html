<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="icon" href="./assets/favicon.svg" />
        <link rel="stylesheet" href="./assets/output.css" />
        <title>LaunderLand</title>
    </head>
    <body class="bg-lpink-500 flex flex-col">
        <header
            class="flex border-b-2 border-b-lpink-300 shadow-md items-center bg-lpink-700 text-white"
        >
            <a href="/" class="flex gap-4 items-center p-4">
                <img
                    class="bg-white rounded-full"
                    src="./assets/favicon.svg"
                    alt="Logo"
                />
                <h1 class="font-bold text-xl">LaunderLand</h1>
            </a>
        </header>
        <main class="overflow-auto bg-[url('./cat.webp')] bg-center p-4">
            <form
                onsubmit="tambahPesanan(event)"
                class="flex flex-col gap-2 *:p-2 *:rounded-md justify-center h-full"
            >
                <input type="text" name="nama" placeholder="Nama" required />
                <textarea name="pakaian" rows="6" cols="80" required></textarea>
                <button type="submit" class="btn">Buat Pesanan</button>
            </form>
        </main>

        <script src="./assets/main.js"></script>
    </body>
</html>
